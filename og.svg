    <line x1="0" y1="-130" x2="0" y2="130" stroke="#5d3d8a" stroke-width="4" opacity="0.45"/>
    <ellipse cx="-50" cy="-70" rx="38" ry="24" fill="#ffffff" opacity="0.45"/>
  </g>

  <!-- Top badge -->
  <rect x="465" y="40" width="270" height="44" rx="22" fill="rgba(201,165,240,0.13)" stroke="#c9a5f0" stroke-opacity="0.55" stroke-width="2"/>
  <text x="600" y="69" text-anchor="middle" font-size="15" font-weight="700" fill="#d8bdf5" font-family="-apple-system, Helvetica, sans-serif" letter-spacing="4">MBTI · PERSONALITY · 1 MIN</text>

  <!-- Main title (Korean) -->
  <text x="600" y="475" text-anchor="middle" font-size="84" font-weight="800" fill="#ffffff" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif">심리테스트 모음</text>

  <!-- Subtitle -->
  <text x="600" y="528" text-anchor="middle" font-size="28" font-weight="500" fill="#c2c8de" font-family="-apple-system, 'Apple SD Gothic Neo', sans-serif">1분 완료 무료 테스트 · 식물 MBTI · 회원가입 없음</text>

