    <circle cx="170" cy="180" r="6"/>
    <circle cx="205" cy="155" r="4"/>
    <circle cx="235" cy="138" r="3"/>
    <circle cx="1030" cy="200" r="6"/>
    <circle cx="995" cy="175" r="4"/>
    <circle cx="965" cy="158" r="3"/>
    <circle cx="190" cy="450" r="5"/>
    <circle cx="1010" cy="430" r="5"/>
    <circle cx="155" cy="380" r="4"/>
    <circle cx="1045" cy="370" r="4"/>
  </g>

  <!-- Brain (stylized) -->
  <g transform="translate(600, 290)">
    <circle cx="0" cy="0" r="140" fill="url(#brain-body)" opacity="0.95"/>
    <g stroke="#5d3d8a" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.6">
      <path d="M -95 -45 Q -65 -75 -32 -50 Q 0 -82 32 -50 Q 65 -75 95 -45"/>
      <path d="M -100 0 Q -55 -28 -10 0 Q 35 -28 80 0 Q 105 -15 105 5"/>
      <path d="M -95 45 Q -50 18 -5 45 Q 40 18 85 45 Q 100 30 95 55"/>
