    </radialGradient>
    <radialGradient id="purple-glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c9a5f0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c9a5f0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="brain-body" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e8d5f5"/>
      <stop offset="60%" stop-color="#c9a5f0"/>
      <stop offset="100%" stop-color="#8b67b8"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="290" r="280" fill="url(#purple-glow)"/>

  <!-- decorative dots (thought bubbles) -->
